<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Learning Path</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { overflow-y: scroll; scrollbar-gutter: stable; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%); min-height: 100vh; padding: 2rem; color: #e0e0e0; }
        .page-wrapper { max-width: 900px; margin: 0 auto; border: 1px solid #2d4a6f; border-radius: 16px; overflow: hidden; background: #0f1e34; padding: 2rem; }
        .container { padding: 0; }
        .year-nav { background: #0a1628; border: 1px solid #2d4a6f; border-radius: 10px; padding: 0.8rem 1.5rem; display: flex; justify-content: center; align-items: center; gap: 0.3rem; }
        .year-nav.pos-top { margin-bottom: 1.5rem; }
        .year-nav.pos-bottom { margin-top: 1.5rem; }
        .year-footer-btn { background: transparent; border: 1px solid #2d4a6f; color: #8ab4f8; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: all 0.2s; }
        .year-footer-btn:hover { background: #1e3a5f; border-color: #2d4a6f; }
        .year-footer-btn.active { background: #00c853; color: #0a1628; border-color: #00c853; }
        .year-footer-sep { color: #2d4a6f; font-size: 1rem; }
        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
        @media (max-width: 480px) {
            body { padding: 0.5rem; }
            .course-card { padding: 0.8rem; }
            .course-row { gap: 0.5rem; }
            .course-link { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
            h1 { font-size: 1.4rem; }
            .subtitle { font-size: 0.9rem; }
        }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
        .subtitle { text-align: center; color: #8ab4f8; margin-bottom: 0.5rem; font-size: 1.1rem; }
        .lang-switch { text-align: center; margin-bottom: 0.5rem; }
        .lang-btn { background: none; border: 1px solid #2d4a6f; color: #8ab4f8; padding: 0.2rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; margin: 0 0.2rem; }
        .lang-btn.active { background: #0077b5; color: #fff; border-color: #0077b5; }
        .progress-bar { background: #1e3a5f; border-radius: 12px; height: 28px; margin: 1.5rem 0; overflow: hidden; border: 1px solid #2d4a6f; }
        .progress-fill { background: linear-gradient(90deg, #00c853, #69f0ae); height: 100%; border-radius: 12px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0a1628; font-size: 0.85rem; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.9rem; color: #8ab4f8; }
        .block-title { font-size: 1.2rem; color: #69f0ae; margin: 2rem 0 1rem; padding-left: 0.5rem; border-left: 4px solid #69f0ae; }
        .course-card { background: #152238; border: 1px solid #2d4a6f; border-radius: 12px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; transition: all 0.3s ease; }
        .course-card:hover { border-color: #8ab4f8; transform: translateX(4px); }
        .course-card.done { border-color: #00c853; background: #0d2818; }
        .course-card.done .course-title { text-decoration: line-through; color: #69f0ae; }
        .course-card.done .badge { opacity: 1; }
        .course-row { display: flex; align-items: center; gap: 1rem; }
        .checkbox { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #5a7a9f; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .course-card.done .checkbox { background: #00c853; border-color: #00c853; }
        .course-card.done .checkbox::after { content: '\2713'; color: #fff; font-weight: bold; font-size: 1rem; }
        .course-info { flex: 1; }
        .course-number { font-size: 0.75rem; color: #5a7a9f; margin-bottom: 0.2rem; }
        .course-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 0.3rem; }
        .course-meta { font-size: 0.8rem; color: #8ab4f8; display: flex; gap: 1rem; flex-wrap: wrap; }
        .course-link { background: linear-gradient(135deg, #0077b5, #005e93); color: #fff; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; transition: all 0.3s; }
        .course-link:hover { background: linear-gradient(135deg, #0088cc, #0077b5); transform: scale(1.05); }
        .badge { font-size: 1.3rem; opacity: 0.2; transition: opacity 0.3s; }
        .proof-section { margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid #2d4a6f; font-size: 0.8rem; }
        .proof-date { color: #69f0ae; margin-bottom: 0.3rem; }
        .proof-cert { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .proof-cert a { color: #8ab4f8; text-decoration: underline; word-break: break-all; }
        .proof-cert a:hover { color: #fff; }
        .cert-edit-btn { background: none; border: 1px solid #5a7a9f; color: #8ab4f8; padding: 0.15rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .cert-edit-btn:hover { border-color: #8ab4f8; color: #fff; }
        .cert-input-row { display: flex; gap: 0.5rem; margin-top: 0.4rem; align-items: center; flex-wrap: wrap; }
        .cert-input { background: #1e3a5f; border: 1px solid #2d4a6f; color: #fff; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; flex: 1; min-width: 200px; }
        .cert-save-btn { background: #0077b5; color: #fff; border: none; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .cert-save-btn:hover { background: #0088cc; }
        .platform-badge { display: inline-block; background: #0077b5; color: #fff; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; }
        .excel-badge { display: inline-block; background: #ff9800; color: #000; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; }
        .sync-bar { display: flex; justify-content: center; align-items: center; gap: 0.8rem; margin: 1rem 0; flex-wrap: wrap; }
        .sync-status { font-size: 0.8rem; color: #8ab4f8; text-align: center; }
        .sync-status.success { color: #69f0ae; }
        .sync-status.error { color: #ff6b6b; }
        .token-section { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin: 0.5rem 0; flex-wrap: wrap; }
        .token-input { background: #1e3a5f; border: 1px solid #2d4a6f; color: #fff; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; width: 320px; }
        .token-btn { background: #00c853; color: #0a1628; border: none; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .footer { text-align: center; margin-top: 2rem; color: #5a7a9f; font-size: 0.85rem; }
        .confetti { display: none; text-align: center; font-size: 2rem; margin: 1rem 0; }
        .confetti.show { display: block; animation: bounce 0.5s ease; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .last-update { font-size: 0.75rem; color: #5a7a9f; text-align: center; margin-top: 0.5rem; }
        .legend { text-align: center; margin: 1rem 0; padding: 0.8rem; background: #152238; border-radius: 8px; border: 1px solid #2d4a6f; font-size: 0.8rem; color: #8ab4f8; }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        #loadingScreen.fade-out { opacity: 0; pointer-events: none; }
        .wk-loader-wrap { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
        .wk-orbit-wrap { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        .wk-logo-img { width: 104px; height: 104px; object-fit: contain; position: relative; z-index: 2; filter: drop-shadow(0 3px 14px rgba(0,0,0,0.7)); }
        .wk-progress-svg { position: absolute; top: 0; left: 0; z-index: 1; overflow: visible; }
        /* Progress-Ring fill animations – circumference per radius */
        .wk-pr-shadow { animation: wk-fill-462 2.8s cubic-bezier(0.2, 0, 0.6, 1) forwards; }
        .wk-pr-main   { animation: wk-fill-452 2.8s cubic-bezier(0.2, 0, 0.6, 1) forwards; }
        .wk-pr-shine  { animation: wk-fill-443 2.8s cubic-bezier(0.2, 0, 0.6, 1) 0.06s forwards; }
        @keyframes wk-fill-462 { from { stroke-dashoffset: 462; } to { stroke-dashoffset: 0; } }
        @keyframes wk-fill-452 { from { stroke-dashoffset: 452; } to { stroke-dashoffset: 0; } }
        @keyframes wk-fill-443 { from { stroke-dashoffset: 443; } to { stroke-dashoffset: 0; } }
        .wk-loader-label { color: #8ab4f8; font-size: 0.95rem; letter-spacing: 0.1em; opacity: 0.85; }    </style>
</head>

    <div class="page-wrapper">
        <div class="year-nav pos-top" id="yearNavTop" style="display:none;"></div>
        <div class="container">
        <h1>🎓 <span id="pageTitle"></span></h1>
        <p class="subtitle"><span id="pageSubtitle"></span> 🏆</p>
        <div class="lang-switch">
            <button class="lang-btn" onclick="setLang('de')">🇩🇪 Deutsch</button>
            <button class="lang-btn" onclick="setLang('en')">🇺🇸 English</button>
        </div>

        <div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div>
        <div class="stats">
            <span id="coursesCompleted"></span>
            <span id="hoursCompleted"></span>
        </div>
        <div class="confetti" id="confetti">🎉🏆🎊 <span id="allDoneText"></span> 🎊🏆🎉</div>

        <div id="coursesContainer"></div>

        <div class="legend" id="legendText"></div>

        <div class="sync-bar">
            <span class="sync-status" id="syncStatus">⏳ ...</span>
        </div>
        <div class="token-section" id="tokenSection" style="display:none;">
            <input type="password" class="token-input" id="tokenInput" placeholder="GitHub Token...">
            <button class="token-btn" onclick="saveTokenBtn()">🔓 <span id="unlockText"></span></button>
        </div>
        <div class="last-update" id="lastUpdate"></div>

        <div class="footer">
            <p>💡 <span id="footer1"></span></p>
            <p style="margin-top:0.5rem" id="footer2"></p>
        </div>
    </div><!-- /container -->
        <div class="year-nav pos-bottom" id="yearNavBottom"></div>

    <script>
        const i18n = {
            de: {
                allDone: 'Alle Kurse abgeschlossen!',
                legend: '📜 Nach Kursabschluss auf LinkedIn → „Zertifikat anzeigen" → URL kopieren und hier einfügen. Dein Kollege sieht Datum + Zertifikats-Link.',
                unlock: 'Freischalten',
                footer1: 'Fortschritt wird zentral gespeichert – dein Kollege sieht deinen Stand hier.',
                coursesOf: (d, t) => `${d} von ${t} Kursen abgeschlossen`,
                hours: (d, t) => `${d} / ${t} Stunden`,
                completedOn: (dt) => `✅ Abgeschlossen am ${dt}`,
                certLabel: 'Zertifikat', certView: 'Auf LinkedIn ansehen ↗', certMissing: '⚠️ Zertifikat noch nicht hinterlegt',
                certPlaceholder: 'Zertifikats-URL einfügen (linkedin.com/learning/certificates/...)',
                certSave: '📜 Speichern', certEdit: '✏️ Ändern',
                connected: '✅ Verbunden – klicke Kurse zum Abhaken',
                viewMode: (n, t) => `📋 Ansichtsmodus – ${n}/${t} Kurse erledigt`,
                saving: '⏳ Speichere...', saved: (x) => `✅ Gespeichert & synchronisiert – ${x}`,
                tokenInvalid: '🔑 Token ungültig – bitte neuen eingeben',
                tokenNeeded: '🔑 Token eingeben um Fortschritt zu speichern',
                saveError: (c) => `⚠️ Fehler beim Speichern (HTTP ${c})`,
                connectedMsg: '✅ Verbunden! Du kannst jetzt Kurse abhaken.',
                loading: '⏳ Lade...', course: 'Kurs', lastUpdate: 'Letztes Update', at: 'um', excelRow: 'Excel', start: '▶ Starten'
            },
            en: {
                allDone: 'All courses completed!',
                legend: '📜 After completing a course on LinkedIn → "View Certificate" → copy URL and paste here. Your colleague sees date + certificate link.',
                unlock: 'Unlock',
                footer1: 'Progress is stored centrally – your colleague can see your status here.',
                coursesOf: (d, t) => `${d} of ${t} courses completed`,
                hours: (d, t) => `${d} / ${t} hours`,
                completedOn: (dt) => `✅ Completed on ${dt}`,
                certLabel: 'Certificate', certView: 'View on LinkedIn ↗', certMissing: '⚠️ Certificate not yet provided',
                certPlaceholder: 'Paste certificate URL (linkedin.com/learning/certificates/...)',
                certSave: '📜 Save', certEdit: '✏️ Edit',
                connected: '✅ Connected – click courses to check off',
                viewMode: (n, t) => `📋 View mode – ${n}/${t} courses completed`,
                saving: '⏳ Saving...', saved: (x) => `✅ Saved & synced – ${x}`,
                tokenInvalid: '🔑 Token invalid – please enter a new one',
                tokenNeeded: '🔑 Enter token to save progress',
                saveError: (c) => `⚠️ Error saving (HTTP ${c})`,
                connectedMsg: '✅ Connected! You can now check off courses.',
                loading: '⏳ Loading...', course: 'Course', lastUpdate: 'Last update', at: 'at', excelRow: 'Excel', start: '▶ Start'
            }
        };

        let lang = 'de';
        function t(key, ...args) { const v = i18n[lang][key]; return typeof v === 'function' ? v(...args) : v; }

        const REPO = 'andymization/learning-path';
        const TOKEN_KEY = 'lernpfad-gh-token';
        let isOwner = false;
        let currentState = { courses: {}, updatedAt: null };
        let coursesData = null;
        let totalCourses = 0;
        let totalHours = 0;
        let currentYear = new Date().getFullYear();
        let availableYears = [];

        // ─── Available years erkennen ────────────────────────────────
        async function detectYears() {
            const token = localStorage.getItem(TOKEN_KEY);
            try {
                let files;
                if (token) {
                    const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/`, {
                        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                    });
                    if (resp.ok) files = await resp.json();
                } else {
                    const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
                    if (resp.ok) files = await resp.json();
                }
                if (files) {
                    const years = files
                        .map(f => f.name.match(/^courses-(\d{4})\.json$/))
                        .filter(m => m)
                        .map(m => parseInt(m[1]))
                        .sort((a, b) => a - b);
                    return years.length ? years : [currentYear];
                }
            } catch (e) {}
            return [currentYear];
        }

        function getNavPosition() {
            return new URLSearchParams(window.location.search).get('nav') || 'bottom';
        }

        function renderYearNav() {
            const pos = getNavPosition();
            const topEl = document.getElementById('yearNavTop');
            const bottomEl = document.getElementById('yearNavBottom');
            const sorted = [...availableYears].sort((a, b) => b - a);
            const html = sorted.map(y =>
                `<button class="year-footer-btn ${y === currentYear ? 'active' : ''}" onclick="switchYear(${y})">${y}</button>`
            ).join('');
            if (pos === 'top') {
                topEl.innerHTML = html; topEl.style.display = 'flex';
                bottomEl.innerHTML = ''; bottomEl.style.display = 'none';
            } else {
                bottomEl.innerHTML = html; bottomEl.style.display = 'flex';
                topEl.innerHTML = ''; topEl.style.display = 'none';
            }
        }

        async function switchYear(year) {
            currentYear = year;
            const url = new URL(window.location);
            url.searchParams.set('year', year);
            history.replaceState(null, '', url);
            renderYearNav();
            setStatus(t('loading'), '');
            coursesData = await loadCourses(year);
            if (!coursesData) { hideLoader(); setStatus(`⚠️ courses-${year}.json not found`, 'error'); return; }
            currentState = await loadState(year);
            renderCourses();
            applyToDom(currentState);
            updateStats();
            showLastUpdate(currentState.updatedAt);
            if (isOwner) { enableCheckboxes(); setStatus(t('connected'), 'success'); }
            else { disableCheckboxes(); setStatus(t('viewMode', Object.keys(currentState.courses).length, totalCourses), ''); }
        }

        // ─── Courses JSON laden ──────────────────────────────────────
        async function loadCourses(year) {
            const token = localStorage.getItem(TOKEN_KEY);
            const file = `courses-${year || currentYear}.json`;
            try {
                let data;
                if (token) {
                    const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${file}`, {
                        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                    });
                    if (resp.ok) { const m = await resp.json(); data = JSON.parse(decodeURIComponent(escape(atob(m.content)))); }
                } else {
                    const resp = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${file}?t=${Date.now()}`);
                    if (resp.ok) data = await resp.json();
                }
                return data || null;
            } catch (e) { return null; }
        }

        // ─── Courses rendern ─────────────────────────────────────────
        function renderCourses() {
            if (!coursesData) return;
            const container = document.getElementById('coursesContainer');
            container.innerHTML = '';
            let courseIndex = 0;

            totalCourses = 0;
            totalHours = 0;
            coursesData.blocks.forEach(block => { totalCourses += block.courses.length; block.courses.forEach(c => totalHours += c.hours); });
            totalHours = Math.round(totalHours * 100) / 100;

            document.getElementById('pageTitle').textContent = coursesData.title[lang] || coursesData.title.en;
            document.getElementById('pageSubtitle').textContent = (coursesData.subtitle[lang] || coursesData.subtitle.en);
            document.getElementById('allDoneText').textContent = t('allDone');
            document.getElementById('legendText').textContent = t('legend');
            document.getElementById('unlockText').textContent = t('unlock');
            document.getElementById('footer1').textContent = t('footer1');
            document.getElementById('footer2').textContent = `${totalHours}h · ${coursesData.source || ''}`;
            document.title = `🎓 ${coursesData.title[lang] || coursesData.title.en}`;

            coursesData.blocks.forEach(block => {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'block-title';
                blockDiv.innerHTML = `${block.icon} ${block.title[lang] || block.title.en}`;
                container.appendChild(blockDiv);

                block.courses.forEach(course => {
                    courseIndex++;
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.dataset.hours = course.hours;
                    card.dataset.id = course.id;
                    card.dataset.row = course.excelRow;

                    card.innerHTML = `
                        <div class="course-row">
                            <div class="checkbox" onclick="toggleCourse(this)"></div>
                            <div class="course-info">
                                <div class="course-number">${t('course')} ${courseIndex} / ${totalCourses} : ${t('excelRow')} #${course.excelRow}</div>
                                <div class="course-title">${course.title}</div>
                                <div class="course-meta">
                                    <span>⏱ ${course.duration}</span>
                                    <span>📊 ${course.level}</span>
                                    <span class="platform-badge">${course.platform}</span>
                                    <span class="excel-badge">📋 Excel #${course.excelRow}</span>
                                </div>
                            </div>
                            <a class="course-link" href="${course.url}" target="_blank">${t('start')}</a>
                            <div class="badge">🏅</div>
                        </div>
                        <div class="proof-section" style="display:none"></div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // ─── State laden ─────────────────────────────────────────────
        async function loadState(year) {
            const stateFile = `state-${year || currentYear}.json`;
            try {
                const token = localStorage.getItem(TOKEN_KEY);
                let data;
                if (token) {
                    const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${stateFile}`, {
                        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
                    });
                    if (resp.ok) { const m = await resp.json(); data = JSON.parse(decodeURIComponent(escape(atob(m.content)))); }
                } else {
                    const resp = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${stateFile}?t=${Date.now()}`);
                    if (resp.ok) data = await resp.json();
                }
                if (data) {
                    if (data.completed && Array.isArray(data.completed)) {
                        const m = { courses: {}, updatedAt: data.updatedAt };
                        data.completed.forEach(id => { m.courses[id] = { completedAt: data.updatedAt || new Date().toISOString(), cert: null }; });
                        return m;
                    }
                    return data;
                }
            } catch (e) {}
            return { courses: {}, updatedAt: null };
        }

        // ─── State schreiben ─────────────────────────────────────────
        async function saveState() {
            const stateFile = `state-${currentYear}.json`;
            const token = localStorage.getItem(TOKEN_KEY);
            if (!token) { document.getElementById('tokenSection').style.display = 'flex'; setStatus(t('tokenNeeded'), 'error'); return false; }
            try {
                setStatus(t('saving'), '');
                currentState.updatedAt = new Date().toISOString();
                const metaResp = await fetch(`https://api.github.com/repos/${REPO}/contents/${stateFile}`, { headers: { Authorization: `token ${token}` } });
                let sha = null;
                if (metaResp.ok) { const meta = await metaResp.json(); sha = meta.sha; }
                const content = JSON.stringify(currentState, null, 2);
                const body = { message: `${Object.keys(currentState.courses).length}/${totalCourses} done (${currentYear})`, content: btoa(unescape(encodeURIComponent(content))) };
                if (sha) body.sha = sha;
                const wr = await fetch(`https://api.github.com/repos/${REPO}/contents/${stateFile}`, {
                    method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body)
                });
                if (wr.ok) { setStatus(t('saved', new Date().toLocaleTimeString()), 'success'); showLastUpdate(currentState.updatedAt); return true; }
                if (wr.status === 401 || wr.status === 403) { localStorage.removeItem(TOKEN_KEY); document.getElementById('tokenSection').style.display = 'flex'; setStatus(t('tokenInvalid'), 'error'); }
                else { setStatus(t('saveError', wr.status), 'error'); }
                return false;
            } catch (e) { setStatus('⚠️ ' + e.message, 'error'); return false; }
        }

        // ─── Token ───────────────────────────────────────────────────
        function saveTokenBtn() {
            const token = document.getElementById('tokenInput').value.trim();
            if (token) {
                localStorage.setItem(TOKEN_KEY, token);
                document.getElementById('tokenSection').style.display = 'none';
                document.getElementById('tokenInput').value = '';
                isOwner = true; enableCheckboxes();
                document.querySelectorAll('.course-card').forEach(c => renderProof(c, currentState.courses[c.dataset.id] || null));
                setStatus(t('connectedMsg'), 'success');
                saveState();
            }
        }

        // ─── Badge als Cert-Link ─────────────────────────────────────
        function updateBadge(badgeEl, certUrl) {
            if (certUrl) {
                badgeEl.innerHTML = `<a href="${certUrl}" target="_blank" rel="noopener" title="Certificate" style="text-decoration:none;">🏅</a>`;
                badgeEl.style.cursor = 'pointer';
            } else {
                badgeEl.innerHTML = '🏅';
                badgeEl.style.cursor = 'default';
            }
        }

        // ─── Proof rendern ───────────────────────────────────────────
        function renderProof(card, courseData) {
            const proofEl = card.querySelector('.proof-section');
            const badgeEl = card.querySelector('.badge');
            if (!courseData) { proofEl.style.display = 'none'; proofEl.innerHTML = ''; updateBadge(badgeEl, null); return; }
            proofEl.style.display = 'block';
            updateBadge(badgeEl, courseData.cert);
            const loc = lang === 'en' ? 'en-US' : 'de-DE';
            const dateStr = courseData.completedAt ? new Date(courseData.completedAt).toLocaleDateString(loc, { day: '2-digit', month: '2-digit', year: 'numeric' }) : '–';
            let certHtml = '';
            if (courseData.cert) {
                certHtml = `<div class="proof-cert">📜 ${t('certLabel')}: <a href="${courseData.cert}" target="_blank" rel="noopener">${t('certView')}</a>`;
                if (isOwner) certHtml += ` <button class="cert-edit-btn" onclick="editCert('${card.dataset.id}')">${t('certEdit')}</button>`;
                certHtml += `</div>`;
            } else if (isOwner) {
                certHtml = `<div class="cert-input-row"><input type="text" class="cert-input" placeholder="${t('certPlaceholder')}" data-id="${card.dataset.id}"><button class="cert-save-btn" onclick="saveCert(this)">${t('certSave')}</button></div>`;
            } else {
                certHtml = `<div class="proof-cert" style="color:#ff9800">${t('certMissing')}</div>`;
            }
            proofEl.innerHTML = `<div class="proof-date">${t('completedOn', dateStr)} · <span class="platform-badge">${card.closest('.course-card') ? 'LinkedIn Learning' : ''}</span></div>${certHtml}`;
        }

        function editCert(id) {
            const card = document.querySelector(`[data-id="${id}"]`);
            const proofEl = card.querySelector('.proof-section');
            const existing = currentState.courses[id].cert || '';
            const loc = lang === 'en' ? 'en-US' : 'de-DE';
            const dateStr = currentState.courses[id].completedAt ? new Date(currentState.courses[id].completedAt).toLocaleDateString(loc, { day: '2-digit', month: '2-digit', year: 'numeric' }) : '–';
            proofEl.innerHTML = `<div class="proof-date">${t('completedOn', dateStr)} · <span class="platform-badge">LinkedIn Learning</span></div><div class="cert-input-row"><input type="text" class="cert-input" value="${existing}" data-id="${id}" placeholder="${t('certPlaceholder')}"><button class="cert-save-btn" onclick="saveCert(this)">${t('certSave')}</button></div>`;
        }

        async function saveCert(btn) {
            const input = btn.previousElementSibling;
            const id = input.dataset.id;
            const url = input.value.trim();
            if (!url) return;
            if (!url.startsWith('http')) { input.style.borderColor = '#ff6b6b'; return; }
            currentState.courses[id].cert = url;
            renderProof(document.querySelector(`[data-id="${id}"]`), currentState.courses[id]);
            await saveState();
        }

        // ─── Toggle ──────────────────────────────────────────────────
        async function toggleCourse(checkbox) {
            if (!isOwner) return;
            const card = checkbox.closest('.course-card');
            const id = card.dataset.id;
            if (card.classList.contains('done')) { card.classList.remove('done'); delete currentState.courses[id]; renderProof(card, null); }
            else { card.classList.add('done'); currentState.courses[id] = { completedAt: new Date().toISOString(), cert: null }; renderProof(card, currentState.courses[id]); }
            updateStats();
            await saveState();
        }

        // ─── DOM ─────────────────────────────────────────────────────
        function applyToDom(state) {
            document.querySelectorAll('.course-card').forEach(card => {
                const d = state.courses[card.dataset.id];
                if (d) { card.classList.add('done'); renderProof(card, d); } else { card.classList.remove('done'); renderProof(card, null); }
            });
        }
        function enableCheckboxes() { document.querySelectorAll('.checkbox').forEach(cb => { cb.style.cursor = 'pointer'; cb.style.opacity = '1'; }); }
        function disableCheckboxes() { document.querySelectorAll('.checkbox').forEach(cb => { cb.style.cursor = 'default'; cb.style.opacity = '0.5'; }); }

        function updateStats() {
            const cards = document.querySelectorAll('.course-card');
            const done = document.querySelectorAll('.course-card.done');
            let h = 0; done.forEach(c => h += parseFloat(c.dataset.hours));
            const pct = cards.length ? Math.round((done.length / cards.length) * 100) : 0;
            document.getElementById('progressFill').style.width = (pct || 2) + '%';
            document.getElementById('progressFill').textContent = pct > 0 ? pct + '%' : '';
            document.getElementById('coursesCompleted').textContent = t('coursesOf', done.length, cards.length);
            document.getElementById('hoursCompleted').textContent = t('hours', h.toFixed(1), totalHours);
            document.getElementById('confetti').classList.toggle('show', done.length === cards.length && cards.length > 0);
        }

        function setStatus(msg, cls) { const el = document.getElementById('syncStatus'); el.textContent = msg; el.className = 'sync-status ' + (cls || ''); }

        function showLastUpdate(dateStr) {
            if (!dateStr) return;
            const d = new Date(dateStr);
            const loc = lang === 'en' ? 'en-US' : 'de-DE';
            document.getElementById('lastUpdate').textContent = `${t('lastUpdate')}: ${d.toLocaleDateString(loc)} ${t('at')} ${d.toLocaleTimeString(loc)}`;
        }

        function getTokenFromHash() { const m = window.location.hash.match(/token=([^&]+)/); return m ? m[1] : null; }

        // ─── Language switch ─────────────────────────────────────────
        function setLang(l) {
            lang = l;
            localStorage.setItem('lernpfad-lang', l);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(l === 'de' ? 'Deutsch' : 'English')));
            renderCourses();
            applyToDom(currentState);
            updateStats();
            showLastUpdate(currentState.updatedAt);
            if (isOwner) { enableCheckboxes(); setStatus(t('connected'), 'success'); }
            else setStatus(t('viewMode', Object.keys(currentState.courses).length, totalCourses), '');
        }

        // ─── Init ────────────────────────────────────────────────────
                const _loaderStart = Date.now();
        function hideLoader() {
            const ls = document.getElementById('loadingScreen');
            if (!ls) return;
            const minDisplay = 2800; // mindestens 2.8 s anzeigen - weil es so geil aussieht
            const wait = Math.max(0, minDisplay - (Date.now() - _loaderStart));
            setTimeout(() => {
                ls.classList.add('fade-out');
                setTimeout(() => ls.remove(), 600);
            }, wait);
        }

        (async function init() {
            const savedLang = localStorage.getItem('lernpfad-lang');
            if (savedLang) lang = savedLang;
            else lang = (navigator.language || 'de').startsWith('en') ? 'en' : 'de';

            const hashToken = getTokenFromHash();
            if (hashToken) localStorage.setItem(TOKEN_KEY, hashToken);
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) { isOwner = true; document.getElementById('tokenSection').style.display = 'none'; setStatus(t('loading'), ''); }
            else { setStatus(t('loading'), ''); }

            availableYears = await detectYears();
            const urlYear = parseInt(new URLSearchParams(window.location.search).get('year'));
            if (urlYear && availableYears.includes(urlYear)) currentYear = urlYear;
            else if (!availableYears.includes(currentYear)) currentYear = availableYears[0];
            renderYearNav();

            coursesData = await loadCourses(currentYear);
            if (!coursesData) { hideLoader(); setStatus(`⚠️ courses-${currentYear}.json not found`, 'error'); return; }

            currentState = await loadState(currentYear);
            setLang(lang);

            if (token) { enableCheckboxes(); setStatus(t('connected'), 'success'); }
            else { disableCheckboxes(); setStatus(t('viewMode', Object.keys(currentState.courses).length, totalCourses), ''); }
            hideLoader();
        })();
    </script>
</body>
</html>
